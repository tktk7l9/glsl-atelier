<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="prism" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ad1ff"/>
      <stop offset="0.5" stop-color="#a07bff"/>
      <stop offset="1" stop-color="#ff5ac8"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#05060d"/>
  <!-- stars -->
  <circle cx="12" cy="14" r="1" fill="#bfe6ff"/>
  <circle cx="52" cy="50" r="1.2" fill="#ffb6e6"/>
  <circle cx="50" cy="16" r="0.9" fill="#cdbcff"/>
  <!-- incoming white beam -->
  <rect x="6" y="31" width="18" height="2" rx="1" fill="#eef3ff"/>
  <!-- prism -->
  <path d="M24 44 L40 18 L44 46 Z" fill="none" stroke="url(#prism)" stroke-width="2.6" stroke-linejoin="round"/>
  <!-- refracted spectrum -->
  <path d="M42 32 L58 24" stroke="#5ad1ff" stroke-width="2" stroke-linecap="round"/>
  <path d="M42 34 L58 33" stroke="#a07bff" stroke-width="2" stroke-linecap="round"/>
  <path d="M42 36 L58 42" stroke="#ff5ac8" stroke-width="2" stroke-linecap="round"/>
</svg>
